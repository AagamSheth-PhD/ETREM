<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETREM – Owner Tracking Panel</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent-gold: #d4a843; --bg-dark: #0d0d0d; --surface: rgba(255,255,255,0.05); --border: rgba(212,168,67,0.25); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* ---- Lock Screen ---- */
        #lock-screen {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
        }
        #lock-screen h1 { font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 1.8rem; margin-bottom: 0.5rem; }
        #lock-screen p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 1.5rem; }
        .lock-icon { font-size: 2.5rem; margin-bottom: 1rem; }

        /* ---- Panel ---- */
        #panel { display: none; width: 100%; max-width: 600px; padding: 2rem; }
        .panel-header { text-align: center; margin-bottom: 2rem; }
        .panel-header h1 { font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 2rem; }
        .panel-header p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 0.3rem; }

        .panel-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; color: var(--accent-gold); margin-bottom: 0.4rem; text-transform: uppercase; }
        .form-group input, .form-group select {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent-gold); }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-panel {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }
        .btn-panel:hover { opacity: 0.9; }
        .btn-panel:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary-panel {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 0.55rem;
        }
        .btn-secondary-panel:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        .status-msg { text-align: center; margin-top: 1rem; font-size: 0.85rem; min-height: 1.2rem; }
        .status-msg.success { color: #4CAF50; }
        .status-msg.error { color: #f44336; }

        .lock-error { color: #f44336; font-size: 0.8rem; margin-top: 0.5rem; display: none; }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1.5rem 0; }
        .logout-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); border-radius: 4px; padding: 0.4rem 0.8rem; font-size: 0.75rem; cursor: pointer; margin-top: 1rem; float: right; }
        .logout-btn:hover { border-color: #f44336; color: #f44336; }
    </style>
</head>
<body>

    <!-- PASSWORD LOCK SCREEN -->
    <div id="lock-screen">
        <div class="lock-icon">🔐</div>
        <h1>ETREM</h1>
        <p>Owner Tracking Panel — Private Access</p>
        <div class="form-group">
            <label for="pw-input">Password</label>
            <input type="password" id="pw-input" placeholder="Enter panel password" autocomplete="current-password">
        </div>
        <button class="btn-panel" id="unlock-btn">Unlock Panel</button>
        <p class="lock-error" id="lock-error">❌ Incorrect password. Try again.</p>
    </div>

    <!-- MAIN PANEL -->
    <div id="panel">
        <div class="panel-header">
            <h1>📦 Tracking Panel</h1>
            <p>Send a branded tracking email to a customer</p>
        </div>

        <div class="panel-card">
            <div style="display:flex; gap: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.12);">
                <button type="button" class="panel-tab-btn active" data-tab="tracking-tab" style="background:none;border:none;padding:0.6rem 0;color:#d4a843;border-bottom:2px solid #d4a843;font-weight:700;letter-spacing:0.6px;cursor:pointer;">Tracking</button>
                <button type="button" class="panel-tab-btn" data-tab="coupons-tab" style="background:none;border:none;padding:0.6rem 0;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;font-weight:700;letter-spacing:0.6px;cursor:pointer;">Coupons</button>
            </div>

            <div id="tracking-tab" class="panel-tab-content" style="display:block;">
                <form id="tracking-form">
                    <div class="form-group">
                        <label for="t-customer-email">Customer Email *</label>
                        <input type="email" id="t-customer-email" placeholder="customer@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="t-customer-name">Customer Name *</label>
                        <input type="text" id="t-customer-name" placeholder="e.g. Rahul Shah" required>
                    </div>
                    <div class="form-group">
                        <label for="t-order-id">Order ID *</label>
                        <input type="text" id="t-order-id" placeholder="e.g. -OLSfxQ..." required>
                    </div>
                    <div class="form-group">
                        <label for="t-courier">Courier Partner</label>
                        <select id="t-courier">
                            <option value="Delhivery">Delhivery</option>
                            <option value="DTDC">DTDC</option>
                            <option value="Blue Dart">Blue Dart</option>
                            <option value="India Post">India Post</option>
                            <option value="Ecom Express">Ecom Express</option>
                            <option value="Xpressbees">Xpressbees</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="t-tracking-link">Tracking Link *</label>
                        <input type="url" id="t-tracking-link" placeholder="https://www.delhivery.com/track/..." required>
                        <button type="button" class="btn-secondary-panel" id="copy-tracking-link-btn" aria-label="Copy tracking link to clipboard">Copy Tracking Link</button>
                    </div>
                    <div class="form-group">
                        <label for="t-estimated-delivery">Estimated Delivery</label>
                        <input type="text" id="t-estimated-delivery" placeholder="e.g. 2–4 business days">
                    </div>

                    <hr class="divider">

                    <button type="submit" class="btn-panel" id="send-tracking-btn">📧 Send Tracking Email</button>
                    <p class="status-msg" id="tracking-status"></p>
                </form>
            </div>

            <div id="coupons-tab" class="panel-tab-content" style="display:none;">
                <div class="form-group">
                    <label for="c-code">Coupon Code *</label>
                    <input type="text" id="c-code" placeholder="e.g. FNF25" maxlength="24">
                </div>
                <div class="form-group">
                    <label for="c-type">Discount Type *</label>
                    <select id="c-type">
                        <option value="percent">Percentage (%)</option>
                        <option value="flat">Flat Amount (₹)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="c-value">Discount Value *</label>
                    <input type="number" id="c-value" placeholder="e.g. 25" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label for="c-minorder">Minimum Order Amount (₹)</label>
                    <input type="number" id="c-minorder" placeholder="e.g. 999" min="0" step="0.01">
                </div>
                <button type="button" class="btn-panel" id="add-coupon-btn">➕ Add Coupon</button>
                <p class="status-msg" id="coupon-add-status"></p>
                <hr class="divider">
                <div id="coupons-list"></div>
            </div>
        </div>

        <div style="text-align:right;">
            <button class="logout-btn" id="logout-btn">🔒 Lock Panel</button>
        </div>
    </div>

    <div id="toast-container"></div>
    <script>
        // ---- CONFIG ----
        const PANEL_PASSWORD = "etrem2024owner"; // Change this password!
        const EMAILJS_SERVICE_ID  = "service_r7f83sg";
        const EMAILJS_PUBLIC_KEY  = "M2IU4HlY2wh4L6Fc0";
        const TRACKING_TEMPLATE   = "template_6oupid9"; // Customer template — for tracking emails
        const FIREBASE_DB_URL = "https://etrem-a3c78-default-rtdb.asia-southeast1.firebasedatabase.app";
        const COUPON_CODE_PATTERN = /^[A-Z0-9_-]+$/;

        document.querySelectorAll('.panel-tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.panel-tab-btn').forEach(b => {
              b.style.color = 'rgba(255,255,255,0.4)';
              b.style.borderBottom = '2px solid transparent';
              b.classList.remove('active');
            });
            document.querySelectorAll('.panel-tab-content').forEach(c => {
              c.style.display = 'none';
            });
            btn.style.color = '#d4a843';
            btn.style.borderBottom = '2px solid #d4a843';
            btn.classList.add('active');
            const target = document.getElementById(btn.dataset.tab);
            if (target) target.style.display = 'block';
            if (btn.dataset.tab === 'coupons-tab') loadCoupons();
          });
        });

        async function firebaseGet(path) {
          const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`);
          if (!res.ok) throw new Error(`Request failed: ${res.status}`);
          return res.json();
        }

        async function firebaseSet(path, data) {
          const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          if (!res.ok) throw new Error(`Request failed: ${res.status}`);
          return res.json();
        }

        async function firebaseDelete(path) {
          const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`, {
            method: 'DELETE'
          });
          if (!res.ok) throw new Error(`Request failed: ${res.status}`);
          return res.json();
        }

        async function loadCoupons() {
          const list = document.getElementById('coupons-list');
          list.innerHTML = '<p>Loading...</p>';
          try {
            const coupons = await firebaseGet('coupons');
            if (!coupons || Object.keys(coupons).length === 0) {
              list.innerHTML = '<p>No coupons yet. Add one above!</p>';
              return;
            }
            list.innerHTML = Object.entries(coupons).map(([key, c]) => `
              <div style="display:flex;justify-content:space-between;align-items:center;
                padding:1rem;border:1px solid rgba(212,168,67,0.2);border-radius:8px;
                margin-bottom:0.75rem;background:rgba(255,255,255,0.03);">
                <div>
                  <p style="font-weight:700;color:#d4a843;font-size:1rem;letter-spacing:1px;">${c.code}</p>
                  <p style="color:rgba(255,255,255,0.6);font-size:0.8rem;margin-top:0.2rem;">
                    ${c.type === 'percent' ? c.value + '% off' : '₹' + c.value + ' off'}
                    ${c.minOrder > 0 ? ' • Min order ₹' + c.minOrder : ''}
                  </p>
                </div>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                  <button onclick="toggleCoupon('${encodeURIComponent(key)}', ${c.enabled})"
                    style="padding:0.4rem 0.8rem;border-radius:4px;border:none;cursor:pointer;
                    font-size:0.75rem;font-weight:700;
                    background:${c.enabled ? '#4CAF50' : 'rgba(255,255,255,0.1)'};
                    color:${c.enabled ? '#000' : 'rgba(255,255,255,0.5)'};">
                    ${c.enabled ? '✅ ON' : '⏸ OFF'}
                  </button>
                  <button onclick="deleteCoupon('${encodeURIComponent(key)}')"
                    style="padding:0.4rem 0.8rem;border-radius:4px;border:none;cursor:pointer;
                    font-size:0.75rem;font-weight:700;background:rgba(244,67,54,0.2);color:#f44336;">
                    🗑️
                  </button>
                </div>
              </div>
            `).join('');
          } catch (err) {
            list.innerHTML = '<p>Failed to load coupons.</p>';
          }
        }

        document.getElementById('add-coupon-btn').addEventListener('click', async () => {
          const code     = document.getElementById('c-code').value.trim().toUpperCase();
          const type     = document.getElementById('c-type').value;
          const value    = parseFloat(document.getElementById('c-value').value);
          const minOrder = parseFloat(document.getElementById('c-minorder').value) || 0;
          const status   = document.getElementById('coupon-add-status');

          if (!code) { status.textContent = '❌ Please enter a coupon code.'; status.className = 'status-msg error'; return; }
          if (!COUPON_CODE_PATTERN.test(code)) { status.textContent = '❌ Use only A-Z, 0-9, _ or - in coupon code.'; status.className = 'status-msg error'; return; }
          if (!value || value <= 0) { status.textContent = '❌ Please enter a valid discount value.'; status.className = 'status-msg error'; return; }
          if (type === 'percent' && value > 100) { status.textContent = '❌ Percentage cannot exceed 100.'; status.className = 'status-msg error'; return; }

          try {
            await firebaseSet(`coupons/${code}`, {
              code, type, value, minOrder, enabled: true,
              createdAt: new Date().toISOString()
            });
            status.textContent = `✅ Coupon ${code} added!`;
            status.className = 'status-msg success';
            document.getElementById('c-code').value = '';
            document.getElementById('c-value').value = '';
            document.getElementById('c-minorder').value = '';
            loadCoupons();
          } catch (err) {
            status.textContent = '❌ Failed to add coupon.';
            status.className = 'status-msg error';
          }
        });

        async function toggleCoupon(key, currentState) {
          const decodedKey = decodeURIComponent(key);
          try {
            const res = await fetch(`${FIREBASE_DB_URL}/coupons/${decodedKey}/enabled.json`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(!currentState)
            });
            if (!res.ok) throw new Error(`Request failed: ${res.status}`);
            loadCoupons();
          } catch (err) { alert('Failed to update coupon.'); }
        }

        async function deleteCoupon(key) {
          const decodedKey = decodeURIComponent(key);
          if (!confirm(`Delete coupon ${decodedKey}?`)) return;
          try {
            await firebaseDelete(`coupons/${decodedKey}`);
            loadCoupons();
          } catch (err) { alert('Failed to delete coupon.'); }
        }

        // ---- LOCK / UNLOCK ----
        const lockScreen = document.getElementById('lock-screen');
        const panel      = document.getElementById('panel');
        const lockError  = document.getElementById('lock-error');

        // Auto-unlock if session is active
        if (sessionStorage.getItem('etrem_panel_unlocked')) {
            lockScreen.style.display = 'none';
            panel.style.display = 'block';
        }

        document.getElementById('unlock-btn').addEventListener('click', () => {
            const pw = document.getElementById('pw-input').value;
            if (pw === PANEL_PASSWORD) {
                sessionStorage.setItem('etrem_panel_unlocked', '1');
                lockScreen.style.display = 'none';
                panel.style.display = 'block';
                lockError.style.display = 'none';
            } else {
                lockError.style.display = 'block';
                document.getElementById('pw-input').value = '';
                document.getElementById('pw-input').focus();
            }
        });

        document.getElementById('pw-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('unlock-btn').click();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('etrem_panel_unlocked');
            lockScreen.style.display = 'flex';
            panel.style.display = 'none';
        });

        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }
            return new Promise((resolve, reject) => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try {
                    const ok = document.execCommand('copy');
                    document.body.removeChild(ta);
                    if (ok) resolve();
                    else reject(new Error('Copy command failed'));
                } catch (err) {
                    document.body.removeChild(ta);
                    reject(err);
                }
            });
        }

        document.getElementById('copy-tracking-link-btn').addEventListener('click', async () => {
            const status = document.getElementById('tracking-status');
            const link = document.getElementById('t-tracking-link').value.trim();
            if (!link) {
                status.textContent = '❌ Please enter a tracking link first.';
                status.className = 'status-msg error';
                return;
            }
            try {
                await copyText(link);
                status.textContent = '✅ Tracking link copied.';
                status.className = 'status-msg success';
            } catch (_) {
                status.textContent = '❌ Could not copy the tracking link.';
                status.className = 'status-msg error';
            }
        });

        // ---- SEND TRACKING EMAIL ----
        document.getElementById('tracking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn    = document.getElementById('send-tracking-btn');
            const status = document.getElementById('tracking-status');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            status.textContent = '';
            status.className = 'status-msg';

            const customerEmail     = document.getElementById('t-customer-email').value.trim();
            const customerName      = document.getElementById('t-customer-name').value.trim();
            const orderId           = document.getElementById('t-order-id').value.trim();
            const courier           = document.getElementById('t-courier').value.trim();
            const trackingLink      = document.getElementById('t-tracking-link').value.trim();

            try {
                const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service_id:  EMAILJS_SERVICE_ID,
                        template_id: TRACKING_TEMPLATE,
                        user_id:     EMAILJS_PUBLIC_KEY,
                        template_params: {
                            to_email:      customerEmail,
                            to_name:       customerName,
                            email_subject: 'Your ETREM Order Has Been Shipped! 🚀',
                            message_body:  `Order ID: ${orderId}\nTracking: ${trackingLink}\nCourier: ${courier}`
                        }
                    })
                });

                if (res.ok) {
                    status.textContent = `✅ Tracking email sent to ${customerEmail}`;
                    status.className = 'status-msg success';
                    document.getElementById('tracking-form').reset();
                } else {
                    throw new Error('Response: ' + res.status);
                }
            } catch (err) {
                status.textContent = '❌ Failed to send tracking email. Please try again.';
                status.className = 'status-msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = '📧 Send Tracking Email';
            }
        });
    </script>
</body>
</html>

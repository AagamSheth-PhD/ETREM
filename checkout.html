<!DOCTYPE html>
<html lang="en-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ETREM</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="header solid"></header>
    <main class="checkout-page">
        <div class="container">
            <div class="checkout-layout">
                <section class="shipping-details">
                    <h2>Shipping Information</h2>
                    <form id="shipping-form">
                        <div class="form-group"><label for="name">Full Name</label><input type="text" id="name" required></div>
                        <div class="form-group"><label for="email">Email</label><input type="email" id="email" required></div>
                        <div class="form-group"><label for="phone">Phone Number</label><input type="tel" id="phone" required></div>
                        <div class="form-group"><label for="address">Address</label><input type="text" id="address" required></div>
                        <div class="form-group"><label for="city">City</label><input type="text" id="city" required></div>
                        <div class="form-group-row">
                            <div class="form-group"><label for="state">State</label><input type="text" id="state" required></div>
                            <div class="form-group"><label for="pincode">Pincode</label><input type="text" id="pincode" required></div>
                        </div>
                    </form>
                </section>
                <aside class="order-summary-checkout">
                    <h3>Your Order</h3>
                    <div id="checkout-items"></div>
                    <div class="summary-row"><span>Subtotal</span><span id="checkout-subtotal"></span></div>
                    <div class="summary-row"><span>Shipping</span><span id="checkout-shipping"></span></div>
                    <div class="summary-row summary-total"><span>Total</span><span id="checkout-total"></span></div>
                    <div class="payment-methods">
                        <h4>Payment Method</h4>
                        <label><input type="radio" name="payment" value="razorpay" checked> Online Payment</label>
                        <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
                    </div>
                    <button id="place-order-btn" class="btn btn-primary btn-block">Place Order</button>
                </aside>
            </div>
        </div>
    </main>
    <footer></footer>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="./js/main.js" defer></script>
</body>
</html>

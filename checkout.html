<!DOCTYPE html>
<html lang="en-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ETREM</title>
    <meta name="robots" content="noindex, nofollow">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body>
    <div id="search-overlay" class="search-overlay"><button id="close-search" class="close-search">&times;</button><input type="text" id="search-input" placeholder="Search for a fragrance..."><div id="search-results"></div></div>
    <header class="header solid"></header>
    <main class="checkout-page">
        <div class="container">
            <h1 class="sr-only">Checkout – ETREM</h1>
            <div class="checkout-layout">
                <section class="shipping-details">
                    <h2>Shipping Information</h2>
                    <form id="shipping-form">
                        <div class="form-group"><label for="name">Full Name</label><input type="text" id="name" required></div>
                        <div class="form-group"><label for="email">Email</label><input type="email" id="email" required></div>
                        <div class="form-group"><label for="phone">Phone Number</label><input type="tel" id="phone" required></div>
                        <div class="form-group"><label for="address">Address</label><input type="text" id="address" required></div>
                        <div class="form-group">
                            <label for="city-select">City</label>
                            <select id="city-select" required>
                                <option value="" disabled selected>Select your city</option>
                                <option value="Surat">Surat (Free Shipping)</option>
                                <option value="other">Other City (+₹60 Shipping)</option>
                            </select>
                        </div>
                        <div class="form-group" id="other-city-group" style="display:none;">
                            <label for="city">Enter Your City</label>
                            <input type="text" id="city" placeholder="Type your city name">
                        </div>
                        <div class="form-group-row">
                            <div class="form-group"><label for="state">State</label><input type="text" id="state" required></div>
                            <div class="form-group"><label for="pincode">Pincode</label><input type="text" id="pincode" required></div>
                        </div>
                    </form>
                </section>
                <aside class="order-summary-checkout">
                    <h3>Your Order</h3>
                    <div id="checkout-items"></div>
                    <div class="summary-row"><span>Subtotal</span><span id="checkout-subtotal"></span></div>
                    <div class="summary-row"><span>Shipping</span><span id="checkout-shipping"></span></div>
                    <div class="summary-row" id="discount-row" style="display:none;color:#4CAF50;"><span>Discount</span><span id="checkout-discount"></span></div>
                    <div class="coupon-section">
                        <div class="coupon-input-group">
                            <input type="text" id="coupon-input" placeholder="Enter coupon code" maxlength="20">
                            <button type="button" id="apply-coupon-btn" class="btn btn-outline">Apply</button>
                        </div>
                        <p id="coupon-message" class="coupon-msg"></p>
                    </div>
                    <div class="summary-row summary-total"><span>Total</span><span id="checkout-total"></span></div>
                    <div class="payment-methods">
                        <h4>Payment Method</h4>
                        <label><input type="radio" name="payment" value="razorpay" checked> Online Payment</label>
                        <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
                    </div>
                    <button id="place-order-btn" class="btn btn-primary btn-block">Place Order</button>
                </aside>
            </div>
        </div>
    </main>
    <footer>
        <nav class="seo-footer" aria-label="Footer Navigation">
            <a href="./shop.html">Shop</a>
            <a href="./about.html">About</a>
            <a href="./contact.html">Contact</a>
        </nav>
    </footer>
    <div id="toast-container"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="./js/main.js" defer></script>
</body>
</html>

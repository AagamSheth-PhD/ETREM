<!DOCTYPE html>
<html lang="en-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - ETREM</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="search-overlay" class="search-overlay"><button id="close-search" class="close-search">&times;</button><input type="text" id="search-input" placeholder="Search for a fragrance..."><div id="search-results"></div></div>
    <header class="header solid"></header>
    <main class="profile-page">
        <div class="container">
            <div class="section-header">
                <h1>My Account</h1>
            </div>
            <div class="profile-layout">
                <aside class="profile-nav">
                    <ul>
                        <li><a href="#details" class="profile-tab active" data-target="details-content">Account Details</a></li>
                        <li><a href="#orders" class="profile-tab" data-target="orders-content">Order History</a></li>
                        <li><a href="#" id="logout-btn">Logout</a></li>
                    </ul>
                </aside>
                <section class="profile-content">
                    <div id="details-content" class="profile-tab-content active">
                        <h3>Account Details</h3>
                        <p><strong>Name:</strong> <span id="profile-name">Loading...</span></p>
                        <p><strong>Email:</strong> <span id="profile-email">Loading...</span></p>
                    </div>
                    <div id="orders-content" class="profile-tab-content">
                        <h3>Order History</h3>
                        <div id="order-history-container">
                            <p>You have not placed any orders yet.</p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <footer>
        <nav class="seo-footer" aria-label="Footer Navigation">
            <a href="./shop.html">Shop</a>
            <a href="./about.html">About</a>
            <a href="./contact.html">Contact</a>
        </nav>
    </footer>
    <div id="toast-container"></div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="./js/main.js" defer></script>
</body>
</html>
